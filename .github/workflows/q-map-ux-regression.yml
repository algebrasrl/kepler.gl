name: q-map UX Regression

on:
  push:
    branches: [master]
    paths:
      - 'examples/q-map/**'
      - 'src/**'
      - '.github/workflows/q-map-ux-regression.yml'
  pull_request:
    branches: [master]
    paths:
      - 'examples/q-map/**'
      - 'src/**'
      - '.github/workflows/q-map-ux-regression.yml'
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'

jobs:
  lint:
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install q-map dependencies
        working-directory: examples/q-map
        run: yarn install

      - name: Lint
        working-directory: examples/q-map
        run: npx eslint src tests

      - name: Typecheck
        working-directory: examples/q-map
        run: npx tsc --noEmit

  ux-regression:
    needs: lint
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install root kepler dependencies (skip native builds)
        run: yarn install --mode skip-build

      - name: Install q-map dependencies
        working-directory: examples/q-map
        run: yarn install

      - name: Install Playwright browser
        working-directory: examples/q-map
        run: npx playwright install --with-deps chromium

      - name: Bootstrap backend and frontend env
        working-directory: examples/q-map
        run: |
          cp backends/.env.example backends/.env
          sed -i "s/^QMAP_DOCKER_UID=.*/QMAP_DOCKER_UID=$(id -u)/" backends/.env
          sed -i "s/^QMAP_DOCKER_GID=.*/QMAP_DOCKER_GID=$(id -g)/" backends/.env
          sed -i "s/^QSTORAGE_ALLOW_INSECURE_DEFAULT_USER=.*/QSTORAGE_ALLOW_INSECURE_DEFAULT_USER=true/" backends/.env
          mkdir -p backends/q-storage-backend/data
          mkdir -p backends/q-cumber-postgis/data
          cat > .env.development.local <<'ENVEOF'
          VITE_QMAP_AI_PROXY_BASE=http://localhost:3004
          VITE_QCUMBER_CLOUD_API_BASE=http://localhost:3001
          VITE_QCUMBER_CLOUD_DISPLAY_NAME=Q-cumber
          VITE_QSTORAGE_CLOUD_API_BASE=http://localhost:3005
          VITE_QSTORAGE_CLOUD_DISPLAY_NAME=Q-storage
          ENVEOF

      - name: Start q-map backends (direct ports)
        working-directory: examples/q-map/backends
        run: DOCTOR_STRICT=0 make up-direct-build

      - name: Wait for backend health
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3001/health >/dev/null \
              && curl -fsS http://127.0.0.1:3005/health >/dev/null \
              && curl -fsS http://127.0.0.1:3004/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backends did not become healthy in time" >&2
          docker compose -f examples/q-map/backends/docker-compose.yaml ps || true
          docker compose -f examples/q-map/backends/docker-compose.yaml logs --tail=50 || true
          exit 1

      - name: Run UX regression suite
        working-directory: examples/q-map
        run: yarn test:e2e tests/e2e/ux-regression.spec.ts

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: q-map-playwright-artifacts
          path: |
            examples/q-map/test-results
            examples/q-map/playwright-report
          if-no-files-found: ignore

      - name: Stop q-map backends
        if: always()
        working-directory: examples/q-map/backends
        run: docker compose down -v

  assistant-live-strict-nightly:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 70
    env:
      Q_ASSISTANT_API_KEY: ${{ secrets.Q_ASSISTANT_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Validate assistant provider secret
        run: |
          if [ -z "${Q_ASSISTANT_API_KEY}" ] && [ -z "${OPENROUTER_API_KEY}" ]; then
            echo "Missing Q_ASSISTANT_API_KEY/OPENROUTER_API_KEY secret required for live assistant nightly gate." >&2
            exit 1
          fi

      - name: Install root kepler dependencies (skip native builds)
        run: yarn install --mode skip-build

      - name: Install q-map dependencies
        working-directory: examples/q-map
        run: yarn install

      - name: Install Playwright browser
        working-directory: examples/q-map
        run: npx playwright install --with-deps chromium

      - name: Bootstrap backend and frontend env
        working-directory: examples/q-map
        run: |
          cp backends/.env.example backends/.env
          sed -i "s/^QMAP_DOCKER_UID=.*/QMAP_DOCKER_UID=$(id -u)/" backends/.env
          sed -i "s/^QMAP_DOCKER_GID=.*/QMAP_DOCKER_GID=$(id -g)/" backends/.env
          sed -i "s/^QSTORAGE_ALLOW_INSECURE_DEFAULT_USER=.*/QSTORAGE_ALLOW_INSECURE_DEFAULT_USER=true/" backends/.env
          mkdir -p backends/q-storage-backend/data
          mkdir -p backends/q-cumber-postgis/data
          cat > .env.development.local <<'ENVEOF'
          VITE_QMAP_AI_PROXY_BASE=http://localhost:3004
          VITE_QCUMBER_CLOUD_API_BASE=http://localhost:3001
          VITE_QCUMBER_CLOUD_DISPLAY_NAME=Q-cumber
          VITE_QSTORAGE_CLOUD_API_BASE=http://localhost:3005
          VITE_QSTORAGE_CLOUD_DISPLAY_NAME=Q-storage
          ENVEOF

      - name: Start q-map backends (direct ports)
        working-directory: examples/q-map/backends
        run: DOCTOR_STRICT=0 make up-direct-build

      - name: Wait for backend health
        run: |
          for i in {1..90}; do
            if curl -fsS http://127.0.0.1:3001/health >/dev/null \
              && curl -fsS http://127.0.0.1:3005/health >/dev/null \
              && curl -fsS http://127.0.0.1:3004/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backends did not become healthy in time" >&2
          docker compose -f examples/q-map/backends/docker-compose.yaml ps || true
          docker compose -f examples/q-map/backends/docker-compose.yaml logs --tail=50 || true
          exit 1

      - name: Run strict assistant live gate
        working-directory: examples/q-map
        run: PW_SKIP_WEBSERVER=0 make assistant-live-gate-strict

      - name: Upload assistant-live artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: q-map-assistant-live-strict-artifacts
          path: |
            examples/q-map/test-results
            examples/q-map/playwright-report
            examples/q-map/backends/logs
          if-no-files-found: ignore

      - name: Stop q-map backends
        if: always()
        working-directory: examples/q-map/backends
        run: docker compose down -v
