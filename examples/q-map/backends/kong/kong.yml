_format_version: "3.0"
_transform: true

# DB-less Kong blueprint for q-map local integration.
# Generated by kong/scripts/render-kong-config.py

consumers:
  - username: qmap-ux
    custom_id: qmap-ux

jwt_secrets:
  - consumer: qmap-ux
    key: 'qmap-ux'
    algorithm: HS256
    secret: 'dev-secret-change-me'

acls:
  - consumer: qmap-ux
    group: qmap-users

plugins:
  - name: correlation-id
    config:
      header_name: x-request-id
      generator: uuid
      echo_downstream: true

  - name: cors
    config:
      origins:
        - http://localhost:8081
        - http://127.0.0.1:8081
        - http://local.q-hive.it
        - http://local.q-hive.it:8081
        - https://local.q-hive.it
        - https://local.q-hive.it:8081
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - x-q-assistant-session-id
        - x-qmap-context
      exposed_headers:
        - x-request-id
        - x-q-assistant-request-id
        - x-q-assistant-chat-id
      credentials: true
      max_age: 3600

  - name: pre-function
    config:
      access:
        - |
          local method = kong.request.get_method()
          if method == "OPTIONS" then
            return
          end
          local auth = kong.request.get_header("authorization")
          if type(auth) ~= "string" then
            return kong.response.exit(401, { message = "Missing bearer token" })
          end
          local token = auth:match("^[Bb]earer%s+(.+)$")
          if not token then
            return kong.response.exit(401, { message = "Missing bearer token" })
          end
          local _, payload_b64 = token:match("^([^.]+)%.([^.]+)%.([^.]+)$")
          if not payload_b64 then
            return kong.response.exit(401, { message = "Malformed JWT" })
          end
          local function b64url_decode(input)
            if type(input) ~= "string" then
              return nil
            end
            local normalized = input:gsub("-", "+"):gsub("_", "/")
            local mod = #normalized % 4
            if mod == 2 then
              normalized = normalized .. "=="
            elseif mod == 3 then
              normalized = normalized .. "="
            elseif mod ~= 0 then
              return nil
            end
            return ngx.decode_base64(normalized)
          end
          local payload_raw = b64url_decode(payload_b64)
          if not payload_raw then
            return kong.response.exit(401, { message = "Malformed JWT payload" })
          end
          local function json_extract_string(raw, key)
            if type(raw) ~= "string" or type(key) ~= "string" then
              return nil
            end
            local pattern = '"' .. key .. '"%s*:%s*"([^"]+)"'
            return raw:match(pattern)
          end
          local function json_extract_string_array(raw, key)
            if type(raw) ~= "string" or type(key) ~= "string" then
              return nil
            end
            local pattern = '"' .. key .. '"%s*:%s*%[(.-)%]'
            local array_raw = raw:match(pattern)
            if type(array_raw) ~= "string" then
              return nil
            end
            local values = {}
            for value in array_raw:gmatch('"([^"]+)"') do
              values[#values + 1] = value
            end
            return values
          end
          local allowed_issuers = { ["qmap-ux"]=true }
          local allowed_audiences = { ["q-map"]=true }
          local require_audience = true
          local iss = json_extract_string(payload_raw, "iss")
          if type(iss) ~= "string" or not allowed_issuers[iss] then
            return kong.response.exit(401, { message = "Invalid issuer claim" })
          end
          if require_audience then
            local aud_ok = false
            local aud_single = json_extract_string(payload_raw, "aud")
            if type(aud_single) == "string" then
              aud_ok = allowed_audiences[aud_single] == true
            end
            if not aud_ok then
              local aud_list = json_extract_string_array(payload_raw, "aud")
              if type(aud_list) == "table" then
                for _, value in ipairs(aud_list) do
                  if type(value) == "string" and allowed_audiences[value] == true then
                    aud_ok = true
                    break
                  end
                end
              end
            end
            if not aud_ok then
              return kong.response.exit(401, { message = "Invalid audience claim" })
            end
          end

services:
  - name: q-assistant
    host: q-assistant
    port: 3004
    protocol: http
    routes:
      - name: q-assistant-route
        paths:
          - /api/q-assistant
        strip_path: true
        preserve_host: false
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
    plugins:
      - name: jwt
        config:
          key_claim_name: iss
          run_on_preflight: false
          claims_to_verify:
            - exp
      - name: acl
        config:
          allow:
            - qmap-users
          hide_groups_header: true
      - name: rate-limiting
        config:
          minute: 300
          policy: local
          limit_by: consumer

  - name: q-cumber
    host: q-cumber-backend
    port: 3001
    protocol: http
    routes:
      - name: q-cumber-route
        paths:
          - /api/q-cumber
        strip_path: true
        preserve_host: false
        methods:
          - GET
          - POST
          - OPTIONS
    plugins:
      - name: jwt
        config:
          key_claim_name: iss
          run_on_preflight: false
          claims_to_verify:
            - exp
      - name: acl
        config:
          allow:
            - qmap-users
          hide_groups_header: true
      - name: rate-limiting
        config:
          minute: 600
          policy: local
          limit_by: consumer

  - name: q-storage
    host: q-storage-backend
    port: 3005
    protocol: http
    routes:
      - name: q-storage-route
        paths:
          - /api/q-storage
        strip_path: true
        preserve_host: false
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
    plugins:
      - name: jwt
        config:
          key_claim_name: iss
          run_on_preflight: false
          claims_to_verify:
            - exp
      - name: acl
        config:
          allow:
            - qmap-users
          hide_groups_header: true
      - name: rate-limiting
        config:
          minute: 300
          policy: local
          limit_by: consumer
